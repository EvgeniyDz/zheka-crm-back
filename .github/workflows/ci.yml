name: Backend CI

# Disabled for automatic runs while the backend is under active construction.
# Run manually from GitHub Actions when we want to validate the current state.
on:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  verify:
    name: Typecheck, lint, build, audit
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      PORT: 4000
      API_PREFIX: api
      APP_URL: http://localhost:4000
      CORS_ORIGINS: http://localhost:1488,http://localhost:3000
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CHECKBOX_API_URL: ${{ secrets.CHECKBOX_API_URL }}
      CHECKBOX_CLIENT_NAME: ${{ secrets.CHECKBOX_CLIENT_NAME }}
      CHECKBOX_CLIENT_VERSION: ${{ secrets.CHECKBOX_CLIENT_VERSION }}
      NOVA_POSHTA_API_URL: ${{ secrets.NOVA_POSHTA_API_URL }}
      NOVA_POSHTA_API_KEY: ${{ secrets.NOVA_POSHTA_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Dependency audit
        run: npm run audit:high

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
